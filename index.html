<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matt Pringle — Portfolio</title>
  <!-- Inter Medium for body text, Montserrat SemiBold for titles -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500&family=Montserrat:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>

  <!-- Custom cursor: glass circle and icon are separate elements so the
       icon's mix-blend-mode blends with the card image, not the glass -->
  <div class="custom-cursor" id="custom-cursor"></div>
  <div class="custom-cursor-icon" id="custom-cursor-icon">
    <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="25" cy="25" r="11" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="25" y1="20" x2="25" y2="30" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="20" y1="25" x2="30" y2="25" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="33" y1="33" x2="40" y2="40" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
  </div>

  <div class="page">

    <!-- Header: avatar, name/role, blurb, CTA buttons -->
    <div class="header">

      <div class="avatar">
        <img src="assets/Avatar.png" alt="Matt Pringle">
      </div>

      <div class="info">
        <p class="name">Matt Pringle</p>
        <p class="role">Product Designer &amp; Systems Lead</p>
      </div>

      <div class="blurb">
        <p>Customer obsessed Product designer and System thinker. 15+ years crafting experiences and the systems that power them.</p>
      </div>

      <div class="buttons">
        <!-- Copies email to clipboard; button text confirms the action -->
        <button class="btn btn-primary" id="say-hi-btn"><span class="btn-label">Say, "Hi 👋"</span></button>
        <a class="btn btn-secondary" href="https://www.linkedin.com/in/prings/" target="_blank" rel="noopener">Linkedin</a>
      </div>

    </div>

    <!-- 3x2 grid of money movement project screenshots -->
    <div class="projects">
      <div class="grid">

        <div class="card">
          <img src="assets/work/money-movement/money-movement-01.jpg" alt="Money Movement">
        </div>

        <div class="card">
          <img src="assets/work/money-movement/money-movement-02.jpg" alt="Money Movement">
        </div>

        <div class="card">
          <img src="assets/work/money-movement/money-movement-03.jpg" alt="Money Movement">
        </div>

        <div class="card">
          <img src="assets/work/money-movement/money-movement-04.jpg" alt="Money Movement">
        </div>

        <div class="card">
          <img src="assets/work/money-movement/money-movement-05.jpg" alt="Money Movement">
        </div>

        <div class="card">
          <img src="assets/work/money-movement/money-movement-06.jpg" alt="Money Movement">
        </div>

      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div>
        <p>Matt Pringle</p>
        <p>© 2026</p>
      </div>
      <p>Made with Claude Code ❤️</p>
    </div>

  </div>

  <!-- Lightbox overlay: shown when a card is clicked -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">
      <img src="assets/close-icon.svg" alt="" class="lightbox-close-icon">
    </button>
    <img class="lightbox-img" id="lightbox-img" src="" alt="">
  </div>

  <script>
    // Custom cursor: follows mouse and shows/hides over project cards.
    // Icon color adapts automatically via mix-blend-mode: exclusion — no JS needed.
    var cursor = document.getElementById('custom-cursor');
    var cursorIcon = document.getElementById('custom-cursor-icon');
    var cards = document.querySelectorAll('.card');

    document.addEventListener('mousemove', function(e) {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
      cursorIcon.style.left = e.clientX + 'px';
      cursorIcon.style.top = e.clientY + 'px';
    });

    cards.forEach(function(card) {
      card.addEventListener('mouseenter', function() {
        cursor.classList.add('visible');
        cursorIcon.classList.add('visible');
      });
      card.addEventListener('mouseleave', function() {
        cursor.classList.remove('visible');
        cursorIcon.classList.remove('visible');
      });
    });

    // "Say, Hi" copies email; label text fades out, swaps, fades back in, then reverts
    var btn = document.getElementById('say-hi-btn');
    var label = btn.querySelector('.btn-label');
    btn.addEventListener('click', function() {
      navigator.clipboard.writeText('prings@gmail.com').then(function() {
        label.classList.add('fading');
        setTimeout(function() {
          label.textContent = 'Email copied!';
          label.classList.remove('fading');
        }, 150);
        setTimeout(function() {
          label.classList.add('fading');
          setTimeout(function() {
            label.textContent = 'Say, \u201cHi \uD83D\uDC4B\u201d';
            label.classList.remove('fading');
          }, 150);
        }, 2000);
      });
    });

    // Scroll-triggered fade-up: cards animate in as they enter the viewport.
    // Observation is delayed until the header finishes animating (~1100ms).
    // Cards in the same row are staggered by their column position.
    var cardObserver = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          var card = entry.target;
          var index = Array.from(cards).indexOf(card);
          var col = index % 3; // 0, 1, or 2 — used for stagger delay
          setTimeout(function() {
            card.classList.add('visible');
          }, col * 80);
          cardObserver.unobserve(card); // only animate once
        }
      });
    }, { threshold: 0.1 });

    // Wait for header to finish before watching cards
    setTimeout(function() {
      cards.forEach(function(card) {
        cardObserver.observe(card);
      });
    }, 1100);

    // Lightbox: open on card click, navigate with arrow keys, close with Escape
    var lightbox = document.getElementById('lightbox');
    var lightboxImg = document.getElementById('lightbox-img');
    var lightboxClose = document.getElementById('lightbox-close');
    var currentIndex = 0;

    function openLightbox(index) {
      currentIndex = (index + cards.length) % cards.length; // wrap around
      var img = cards[currentIndex].querySelector('img');
      lightboxImg.src = img.src;
      lightboxImg.alt = img.alt;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    cards.forEach(function(card, i) {
      card.addEventListener('click', function() {
        openLightbox(i);
      });
    });

    lightboxClose.addEventListener('click', function() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    });

    // Close when clicking the dark backdrop (not the image itself)
    lightbox.addEventListener('click', function(e) {
      if (e.target === lightbox) lightbox.classList.remove('open');
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        lightbox.classList.remove('open');
      document.body.style.overflow = '';
      } else if (lightbox.classList.contains('open')) {
        if (e.key === 'ArrowRight') openLightbox(currentIndex + 1);
        if (e.key === 'ArrowLeft')  openLightbox(currentIndex - 1);
      }
    });
  </script>

</body>
</html>
