<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matt Pringle — Portfolio</title>
  <!-- Montserrat Medium from Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      background: #050505;
      color: #f1f1f1;
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
    }

    /* ─── Hero section ─────────────────────────────────────── */
    .hero {
      position: relative;
      width: 100%;
      padding: 56px 40px 120px;
    }

    /* Centered content container with max-width */
    .hero .inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Background video fills the hero */
    .hero video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.3;
      z-index: 0;
    }

    /* Gradient: transparent at top, fades to page bg at 85% */
    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0), #050505 85%);
      pointer-events: none;
      z-index: 1;
    }

    /* Header content sits above video and gradient */
    .header {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 24px;
      width: 100%;
    }

    /* ─── Avatar ─────────────────────────────────────────────── */
    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 999px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ─── Name / Title / Links ───────────────────────────────── */
    .info {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .info .name {
      font-size: 18px;
      line-height: 24px;
    }

    .info .role {
      font-size: 14px;
      line-height: 20px;
    }

    .info .links {
      font-size: 14px;
      line-height: 20px;
    }

    .info .links a {
      color: #f1f1f1;
      text-decoration: underline;
    }

    /* ─── Email tooltip ──────────────────────────────────────── */
    .email-wrap {
      position: relative;
      display: inline-block;
    }

    .tooltip {
      position: absolute;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) translateY(-4px);
      background: #0066ff;
      color: #f1f1f1;
      font-size: 14px;
      line-height: 20px;
      padding: 8px 12px;
      border-radius: 56px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .tooltip.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ─── Entrance animation ─────────────────────────────────── */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Each header child starts invisible and animates in */
    .header .avatar,
    .header .info,
    .header .blurb {
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
    }

    .header .avatar { animation-delay: 0ms; }
    .header .info   { animation-delay: 200ms; }
    .header .blurb  { animation-delay: 400ms; }

    /* ─── Blurb ──────────────────────────────────────────────── */
    .blurb {
      padding-top: 64px;
    }

    .blurb p {
      font-size: 36px;
      line-height: 44px;
      max-width: 745px;
    }

    /* ─── Content below hero ─────────────────────────────────── */
    .content {
      padding: 0 100px 56px;
    }
  </style>
</head>
<body>

  <!-- Hero with looping video background -->
  <section class="hero">
    <video src="assets/seamless_loop_1080p.mp4" autoplay muted loop playsinline></video>

    <div class="inner">
    <div class="header">

      <!-- Circular avatar photo -->
      <div class="avatar">
        <img src="https://www.figma.com/api/mcp/asset/ed2fa49d-035f-42ff-bedc-a7c76073c789" alt="Matt Pringle">
      </div>

      <!-- Name, role, and contact links -->
      <div class="info">
        <p class="name">Matt Pringle</p>
        <p class="role">Staff Product designer at OnePay</p>
        <p class="links">
          <a href="https://www.linkedin.com/in/prings/" target="_blank" rel="noopener">LinkedIn</a> · <span class="email-wrap"><a href="#" id="email-link">Email</a><span class="tooltip" id="email-tooltip">Copied!</span></span>
        </p>
      </div>

      <!-- Hero tagline -->
      <div class="blurb">
        <p>Customer obsessed. Product designer. System thinker. 15+ years crafting product experiences and the systems that power them.</p>
      </div>

    </div>
    </div>
  </section>

  <script>
    // Copy email to clipboard and show tooltip on click
    document.getElementById('email-link').addEventListener('click', function(e) {
      e.preventDefault();
      navigator.clipboard.writeText('prings@gmail.com').then(function() {
        var tooltip = document.getElementById('email-tooltip');
        tooltip.classList.add('show');
        setTimeout(function() { tooltip.classList.remove('show'); }, 2000);
      });
    });
  </script>

  <!-- Project cards go here -->
  <div class="content">
  </div>

</body>
</html>
